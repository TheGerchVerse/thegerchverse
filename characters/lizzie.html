<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lizzie Holmes | Gerch-Verse</title>
  <link rel="stylesheet" href="../gerchverse.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --char-color: #FF007F; }

    /* Page Layout */
    .char-page { 
      padding-top: 100px; 
      max-width: 1400px; 
      margin: 0 auto; 
      padding-left: 1rem; 
      padding-right: 1rem; 
    }

    /* Header Section */
    .char-header { 
      display: flex; 
      align-items: center; 
      gap: 1.5rem; 
      margin-bottom: 2rem; 
      padding: 1.5rem; 
      background: rgba(0, 0, 0, 0.5); 
      border: 2px solid var(--char-color); 
      border-radius: 16px; 
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(0,0,0,0.2); 
    }

    .char-avatar { 
      width: 120px; 
      height: 120px; 
      border-radius: 50%; 
      object-fit: cover; 
      border: 3px solid var(--char-color); 
      box-shadow: 0 0 20px var(--char-color); 
      flex-shrink: 0;
    }

    .char-info h1 { 
      font-family: 'Orbitron', sans-serif; 
      font-size: 2rem; 
      color: var(--char-color); 
      margin: 0 0 0.3rem 0; 
      text-shadow: 0 0 15px var(--char-color); 
    }

    .char-handle { 
      color: #888; 
      font-size: 1rem; 
      margin: 0 0 0.2rem 0; 
    }

    .char-role { 
      color: #aaa; 
      font-size: 0.9rem; 
      margin: 0 0 0.8rem 0; 
    }

    .char-stats { 
      display: flex; 
      gap: 1rem; 
      flex-wrap: wrap;
    }

    .char-stats .stat { 
      background: rgba(0, 0, 0, 0.4); 
      padding: 0.4rem 0.8rem; 
      border-radius: 20px; 
      font-size: 0.8rem; 
      color: var(--char-color); 
      border: 1px solid var(--char-color); 
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
    }

    /* Video Sections */
    .video-section { 
      margin-bottom: 2rem; 
    }

    .section-header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      margin-bottom: 1rem; 
      padding-bottom: 0.5rem; 
      border-bottom: 2px solid rgba(0, 0, 0, 0.3); 
    }

    .section-title { 
      font-family: 'Orbitron', sans-serif; 
      font-size: 1.3rem; 
      color: #fff; 
      margin: 0; 
    }

    .section-title span { 
      color: var(--char-color); 
      font-size: 1rem;
      margin-left: 0.5rem;
    }

    /* Video Grid - 200px min, 6/3/2 columns */
    .video-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
      gap: 1rem; 
    }

    /* Compact Video Cards */
    .video-card { 
      background: rgba(0, 0, 0, 0.4); 
      border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 10px; 
      overflow: hidden; 
      text-decoration: none; 
      transition: all 0.25s ease; 
      display: block; 
    }

    .video-card:hover { 
      transform: translateY(-4px); 
      border-color: var(--char-color); 
      box-shadow: 0 8px 25px rgba(0,0,0,0.4), 0 0 15px var(--char-color); 
    }

    .card-media { 
      position: relative; 
      aspect-ratio: 16/9; 
      overflow: hidden;
    }

    .card-media img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transition: transform 0.3s ease;
    }

    .video-card:hover .card-media img {
      transform: scale(1.05);
    }

    .card-placeholder { 
      width: 100%; 
      height: 100%; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: var(--char-color); 
      font-family: 'Orbitron', sans-serif; 
      font-size: 0.75rem; 
      text-align: center; 
      padding: 0.5rem;
    }

    .card-badge { 
      position: absolute; 
      top: 6px; 
      right: 6px; 
      background: var(--char-color); 
      color: #000; 
      padding: 0.2rem 0.5rem; 
      border-radius: 4px; 
      font-size: 0.7rem; 
      font-weight: 700; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-content { 
      padding: 0.75rem; 
    }

    .card-oneliner { 
      color: #fff; 
      font-size: 0.85rem; 
      margin: 0; 
      line-height: 1.3; 
      font-family: 'Rajdhani', sans-serif;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-costars { 
      color: var(--char-color); 
      font-size: 0.75rem; 
      margin: 0.4rem 0 0 0; 
      opacity: 0.9; 
      font-family: 'Rajdhani', sans-serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Pagination */
    .pagination { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      gap: 1rem; 
      margin-top: 1.5rem; 
      padding: 1rem;
    }

    .page-btn { 
      background: rgba(0, 0, 0, 0.4); 
      border: 1px solid var(--char-color); 
      color: var(--char-color); 
      padding: 0.5rem 1rem; 
      border-radius: 6px; 
      cursor: pointer; 
      font-family: 'Orbitron', sans-serif; 
      font-size: 0.85rem;
      transition: all 0.2s ease; 
    }

    .page-btn:hover:not(:disabled) { 
      background: var(--char-color); 
      color: #000; 
      box-shadow: 0 0 15px var(--char-color);
    }

    .page-btn:disabled { 
      opacity: 0.3; 
      cursor: not-allowed; 
      border-color: #444;
      color: #666;
    }

    .page-info { 
      color: #888; 
      font-family: 'Rajdhani', sans-serif; 
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* Messages */
    .empty-message, .error-message { 
      text-align: center; 
      padding: 2rem; 
      color: #888; 
      font-style: italic; 
      font-family: 'Rajdhani', sans-serif;
      grid-column: 1 / -1;
    }

    .error-message { 
      color: #ff4444; 
    }

    /* Loading State */
    .loading {
      color: var(--char-color);
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      padding: 2rem;
    }

    /* Responsive Breakpoints */
    @media (max-width: 768px) { 
      .char-header { 
        flex-direction: column; 
        text-align: center; 
        padding: 1rem;
      } 
      .char-avatar { 
        width: 90px; 
        height: 90px; 
      } 
      .char-info h1 { 
        font-size: 1.6rem; 
      }
      .char-stats {
        justify-content: center;
      }
      .video-grid { 
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
      }
    }

    @media (max-width: 480px) { 
      .char-page {
        padding-left: 0.75rem;
        padding-right: 0.75rem;
        padding-top: 80px;
      }
      .char-header {
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .char-avatar { 
        width: 80px; 
        height: 80px; 
        border-width: 2px;
      }
      .char-info h1 { 
        font-size: 1.4rem; 
      }
      .char-handle {
        font-size: 0.9rem;
      }
      .char-role {
        font-size: 0.8rem;
      }
      .video-grid { 
        grid-template-columns: repeat(2, 1fr); 
        gap: 0.75rem;
      }
      .card-content {
        padding: 0.6rem;
      }
      .card-oneliner {
        font-size: 0.8rem;
        -webkit-line-clamp: 2;
      }
      .section-title {
        font-size: 1.1rem;
      }
      .pagination {
        gap: 0.5rem;
        padding: 0.75rem;
      }
      .page-btn {
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
      }
    }

    /* Hide multi section when empty */
    #multi-videos-section[style*="display: none"] {
      display: none !important;
    }
  </style>
</head>
<body data-character="lizzie">
  <nav class="main-nav">
    <a href="../index.html" class="logo">
      <span class="logo-icon">🥛</span>
      <span class="logo-text">GERCH<span class="highlight">-VERSE</span></span>
    </a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="../fam.html">The Fam</a>
      <a href="../milk-vision.html">Milk Vision</a>
      <a href="../gulag.html">Gulag</a>
      <a href="../careers.html">Careers</a>
    </div>
  </nav>

  <main class="char-page">
    <div id="character-header" class="char-header">
      <div class="loading">Loading character...</div>
    </div>

    <section class="video-section">
      <div class="section-header">
        <h2 class="section-title">Solo Videos <span id="solo-count">0</span></h2>
      </div>
      <div id="solo-videos-grid" class="video-grid"></div>
      <div id="solo-pagination" class="pagination" style="display: none;"></div>
    </section>

    <section id="multi-videos-section" class="video-section" style="display: none;">
      <div class="section-header">
        <h2 class="section-title">Multi-Character Videos <span id="multi-count">0</span></h2>
      </div>
      <div id="multi-videos-grid" class="video-grid"></div>
      <div id="multi-pagination" class="pagination" style="display: none;"></div>
    </section>
  </main>

  <footer class="main-footer" style="margin-top: 3rem; padding: 1.5rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.1);">
    <p style="color: #666; font-size: 0.9rem;">&copy; 2025 Gerch-Verse. All udders reserved.</p>
    <p style="color: #444; font-size: 0.75rem; margin-top: 0.5rem;">
      <a href="../fam.html" style="color: var(--char-color); text-decoration: none; font-family: 'Orbitron', sans-serif;">← Back to The Fam</a>
    </p>
  </footer>

  <script src="../videos.js"></script>
  <script src="../character-loader.js"></script>
</body>
</html>
