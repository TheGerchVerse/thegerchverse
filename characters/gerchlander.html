<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerchlander | Gerch-Verse</title>
  <link rel="stylesheet" href="../gerchverse.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --char-color: #FF0000; }

    .char-page { 
      padding-top: 100px; 
      max-width: 1400px; 
      margin: 0 auto; 
      padding-left: 1rem; 
      padding-right: 1rem; 
    }

    .char-header { 
      display: flex; 
      align-items: center; 
      gap: 1.5rem; 
      margin-bottom: 2rem; 
      padding: 1.5rem; 
      background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 100%); 
      border: 2px solid var(--char-color); 
      border-radius: 16px; 
      box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,0,0,0.2), 0 0 15px var(--char-color); 
    }

    .char-avatar { 
      width: 120px; 
      height: 120px; 
      border-radius: 50%; 
      object-fit: cover; 
      border: 3px solid var(--char-color); 
      box-shadow: 0 0 25px var(--char-color); 
      flex-shrink: 0;
    }

    .char-info h1 { 
      font-family: 'Orbitron', sans-serif; 
      font-size: 2.2rem; 
      color: var(--char-color); 
      margin: 0 0 0.3rem 0; 
      text-shadow: 0 0 20px var(--char-color), 0 0 40px var(--char-color); 
      letter-spacing: 1px;
    }

    .char-handle { 
      color: #aaa; 
      font-size: 1rem; 
      margin: 0 0 0.2rem 0; 
      font-family: 'Rajdhani', sans-serif;
    }

    .char-role { 
      color: #888; 
      font-size: 0.95rem; 
      margin: 0 0 0.8rem 0; 
      font-family: 'Rajdhani', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .char-stats { 
      display: flex; 
      gap: 1rem; 
      flex-wrap: wrap;
    }

    .char-stats .stat { 
      background: rgba(0, 0, 0, 0.5); 
      padding: 0.5rem 1rem; 
      border-radius: 20px; 
      font-size: 0.85rem; 
      color: var(--char-color); 
      border: 1px solid var(--char-color); 
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .video-section { 
      margin-bottom: 2.5rem; 
      background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.3) 100%);
      border: 2px solid var(--char-color);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 0 20px rgba(0,0,0,0.4), inset 0 0 20px rgba(0,0,0,0.1), 0 0 10px var(--char-color);
    }

    .section-header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      margin-bottom: 1.5rem; 
      padding-bottom: 0.75rem; 
      border-bottom: 2px solid var(--char-color);
    }

    .section-title { 
      font-family: 'Orbitron', sans-serif; 
      font-size: 1.4rem; 
      color: #fff; 
      margin: 0;
      text-shadow: 0 0 10px var(--char-color);
    }

    .section-title span { 
      color: var(--char-color); 
      font-size: 1.1rem;
      margin-left: 0.5rem;
      text-shadow: 0 0 10px var(--char-color);
    }

    .video-grid { 
      display: grid; 
      grid-template-columns: repeat(6, 1fr); 
      gap: 1rem; 
    }

    .video-card { 
      background: rgba(0, 0, 0, 0.6); 
      border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 10px; 
      overflow: hidden; 
      text-decoration: none; 
      transition: all 0.3s ease; 
      display: block; 
      position: relative;
    }

    .video-card:hover { 
      transform: translateY(-5px) scale(1.02); 
      border-color: var(--char-color); 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px var(--char-color); 
      z-index: 10;
    }

    .card-media { 
      position: relative; 
      aspect-ratio: 16/9; 
      overflow: hidden;
      background: #000;
    }

    .card-media img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transition: transform 0.3s ease;
    }

    .video-card:hover .card-media img {
      transform: scale(1.1);
    }

    .card-placeholder { 
      width: 100%; 
      height: 100%; 
      background: linear-gradient(135deg, #1a1a2e 0%, #0d1117 100%); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: var(--char-color); 
      font-family: 'Orbitron', sans-serif; 
      font-size: 0.7rem; 
      text-align: center; 
      padding: 0.5rem;
      opacity: 0.7;
    }

    .card-badge { 
      position: absolute; 
      top: 5px; 
      right: 5px; 
      background: var(--char-color); 
      color: #000; 
      padding: 0.15rem 0.4rem; 
      border-radius: 3px; 
      font-size: 0.65rem; 
      font-weight: 800; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .card-content { 
      padding: 0.6rem; 
      background: rgba(0,0,0,0.4);
    }

    .card-oneliner { 
      color: #fff; 
      font-size: 0.8rem; 
      margin: 0; 
      line-height: 1.3; 
      font-family: 'Rajdhani', sans-serif;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-weight: 500;
    }

    .card-costars { 
      color: var(--char-color); 
      font-size: 0.7rem; 
      margin: 0.3rem 0 0 0; 
      opacity: 0.9; 
      font-family: 'Rajdhani', sans-serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 600;
    }

    .pagination { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      gap: 1rem; 
      margin-top: 1.5rem; 
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .page-btn { 
      background: rgba(0, 0, 0, 0.5); 
      border: 2px solid var(--char-color); 
      color: var(--char-color); 
      padding: 0.6rem 1.2rem; 
      border-radius: 8px; 
      cursor: pointer; 
      font-family: 'Orbitron', sans-serif; 
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s ease; 
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .page-btn:hover:not(:disabled) { 
      background: var(--char-color); 
      color: #000; 
      box-shadow: 0 0 20px var(--char-color);
      transform: translateY(-2px);
    }

    .page-btn:disabled { 
      opacity: 0.3; 
      cursor: not-allowed; 
      border-color: #444;
      color: #666;
    }

    .page-info { 
      color: #aaa; 
      font-family: 'Rajdhani', sans-serif; 
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .empty-message, .error-message { 
      text-align: center; 
      padding: 3rem; 
      color: #888; 
      font-style: italic; 
      font-family: 'Rajdhani', sans-serif;
      grid-column: 1 / -1;
      font-size: 1rem;
    }

    .error-message { 
      color: #ff4444; 
    }

    .loading {
      color: var(--char-color);
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      padding: 2rem;
      font-size: 1.1rem;
      text-shadow: 0 0 10px var(--char-color);
    }

    @media (max-width: 1024px) { 
      .video-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 0.875rem;
      }
      .char-header {
        padding: 1.25rem;
      }
      .video-section {
        padding: 1.25rem;
      }
    }

    @media (max-width: 768px) { 
      .char-page {
        padding-left: 0.75rem;
        padding-right: 0.75rem;
        padding-top: 85px;
      }

      .char-header { 
        flex-direction: column; 
        text-align: center; 
        padding: 1rem;
        gap: 1rem;
        margin-bottom: 1.5rem;
      } 

      .char-avatar { 
        width: 90px; 
        height: 90px; 
        border-width: 2px;
      } 

      .char-info h1 { 
        font-size: 1.6rem; 
      }

      .char-stats {
        justify-content: center;
      }

      .video-section {
        padding: 1rem;
        margin-bottom: 1.5rem;
      }

      .section-header {
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
      }

      .section-title {
        font-size: 1.1rem;
      }

      .video-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 0.5rem; 
      }

      .card-content {
        padding: 0.4rem;
      }

      .card-oneliner {
        font-size: 0.7rem;
        line-height: 1.2;
        -webkit-line-clamp: 2;
      }

      .card-costars {
        font-size: 0.6rem;
        margin-top: 0.2rem;
      }

      .card-badge {
        font-size: 0.55rem;
        padding: 0.1rem 0.3rem;
        top: 3px;
        right: 3px;
      }

      .pagination {
        gap: 0.75rem;
        margin-top: 1rem;
        padding-top: 0.75rem;
      }

      .page-btn {
        padding: 0.5rem 1rem;
        font-size: 0.75rem;
      }

      .page-info {
        font-size: 0.8rem;
      }
    }

    @media (max-width: 380px) {
      .video-grid {
        gap: 0.4rem;
      }

      .card-oneliner {
        font-size: 0.65rem;
      }
    }

    #multi-videos-section[style*="display: none"] {
      display: none !important;
    }
  </style>
</head>
<body data-character="gerchlander">
  <nav class="main-nav">
    <a href="../index.html" class="logo">
      <span class="logo-icon">🥛</span>
      <span class="logo-text">GERCH<span class="highlight">-VERSE</span></span>
    </a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="../fam.html">The Fam</a>
      <a href="../milk-vision.html">Milk Vision</a>
      <a href="../gulag.html">Gulag</a>
      <a href="../careers.html">Careers</a>
    </div>
  </nav>

  <main class="char-page">
    <div id="character-header" class="char-header">
      <div class="loading">Loading character...</div>
    </div>

    <section class="video-section">
      <div class="section-header">
        <h2 class="section-title">Solo Videos <span id="solo-count">0</span></h2>
      </div>
      <div id="solo-videos-grid" class="video-grid"></div>
      <div id="solo-pagination" class="pagination" style="display: none;"></div>
    </section>

    <section id="multi-videos-section" class="video-section" style="display: none;">
      <div class="section-header">
        <h2 class="section-title">Multi-Character Videos <span id="multi-count">0</span></h2>
      </div>
      <div id="multi-videos-grid" class="video-grid"></div>
      <div id="multi-pagination" class="pagination" style="display: none;"></div>
    </section>
  </main>

  <footer class="main-footer" style="margin-top: 3rem; padding: 1.5rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.1);">
    <p style="color: #666; font-size: 0.9rem;">&copy; 2025 Gerch-Verse. All udders reserved.</p>
    <p style="color: #444; font-size: 0.75rem; margin-top: 0.5rem;">
      <a href="../fam.html" style="color: var(--char-color); text-decoration: none; font-family: 'Orbitron', sans-serif;">← Back to The Fam</a>
    </p>
  </footer>

  <script src="../videos.js"></script>
  <script src="../character-loader.js"></script>
</body>
</html>
