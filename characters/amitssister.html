<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amit's Sister | Gerch-Verse</title>
  <link rel="stylesheet" href="../gerchverse.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --char-color: #00FFFF; }
    .char-page { padding-top: 100px; max-width: 1400px; margin: 0 auto; padding-left: 2rem; padding-right: 2rem; }
    .char-header { display: flex; align-items: center; gap: 2rem; margin-bottom: 3rem; padding: 2rem; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--char-color); border-radius: 16px; box-shadow: 0 0 30px rgba(0, 255, 255, 0.1); }
    .char-avatar { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid var(--char-color); box-shadow: 0 0 30px var(--char-color); }
    .char-info h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--char-color); margin: 0 0 0.5rem 0; text-shadow: 0 0 15px var(--char-color); }
    .char-handle { color: #888; font-size: 1.1rem; margin: 0 0 0.3rem 0; }
    .char-role { color: #aaa; font-size: 1rem; margin: 0 0 1rem 0; }
    .char-stats { display: flex; gap: 1.5rem; }
    .char-stats .stat { background: rgba(0, 255, 255, 0.1); padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; color: var(--char-color); border: 1px solid var(--char-color); }
    .video-section { margin-bottom: 3rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 2px solid rgba(0, 255, 255, 0.2); }
    .section-title { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: #fff; margin: 0; }
    .section-title span { color: var(--char-color); }
    .video-count { background: rgba(0, 255, 255, 0.1); color: var(--char-color); padding: 0.3rem 0.8rem; border-radius: 15px; font-size: 0.85rem; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .video-card { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0, 255, 255, 0.2); border-radius: 12px; overflow: hidden; text-decoration: none; transition: all 0.3s ease; display: block; }
    .video-card:hover { transform: translateY(-5px); border-color: var(--char-color); box-shadow: 0 10px 30px rgba(0, 255, 255, 0.2); }
    .card-media { position: relative; aspect-ratio: 16/9; }
    .card-media img { width: 100%; height: 100%; object-fit: cover; }
    .card-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); display: flex; align-items: center; justify-content: center; color: var(--char-color); font-family: 'Orbitron', sans-serif; font-size: 0.9rem; text-align: center; }
    .card-badge { position: absolute; top: 10px; right: 10px; background: var(--char-color); color: #000; padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .card-content { padding: 1rem; }
    .card-oneliner { color: #fff; font-size: 0.95rem; margin: 0; line-height: 1.4; }
    .card-costars { color: var(--char-color); font-size: 0.8rem; margin: 0.5rem 0 0 0; opacity: 0.8; }
    .pagination { display: flex; justify-content: center; align-items: center; gap: 1rem; margin-top: 1.5rem; }
    .page-btn { background: rgba(0, 255, 255, 0.1); border: 1px solid var(--char-color); color: var(--char-color); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-family: 'Orbitron', sans-serif; transition: all 0.3s ease; }
    .page-btn:hover:not(:disabled) { background: var(--char-color); color: #000; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-info { color: #888; font-family: 'Rajdhani', sans-serif; }
    .empty-message, .error-message { text-align: center; padding: 3rem; color: #888; font-style: italic; }
    .error-message { color: #ff4444; }
    @media (max-width: 768px) { .char-header { flex-direction: column; text-align: center; } .char-avatar { width: 100px; height: 100px; } .char-info h1 { font-size: 1.8rem; } .video-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body data-character="amitssister">
  <nav class="main-nav">
    <a href="../index.html" class="logo">
      <span class="logo-icon">🥛</span>
      <span class="logo-text">GERCH<span class="highlight">-VERSE</span></span>
    </a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="../fam.html">The Fam</a>
      <a href="../milk-vision.html">Milk Vision</a>
      <a href="../gulag.html">Gulag</a>
      <a href="../careers.html">Careers</a>
    </div>
  </nav>
  <main class="char-page">
    <div id="character-header" class="char-header">
      <div class="loading">Loading character...</div>
    </div>
    <section class="video-section">
      <div class="section-header">
        <h2 class="section-title">Solo Videos <span id="solo-count">0</span></h2>
      </div>
      <div id="solo-videos-grid" class="video-grid"></div>
      <div id="solo-pagination" class="pagination" style="display: none;"></div>
    </section>
    <section id="multi-videos-section" class="video-section" style="display: none;">
      <div class="section-header">
        <h2 class="section-title">Multi-Character Videos <span id="multi-count">0</span></h2>
      </div>
      <div id="multi-videos-grid" class="video-grid"></div>
      <div id="multi-pagination" class="pagination" style="display: none;"></div>
    </section>
  </main>
  <footer class="main-footer" style="margin-top: 4rem; padding: 2rem; text-align: center; border-top: 1px solid rgba(0, 255, 255, 0.2);">
    <p style="color: #666;">&copy; 2025 Gerch-Verse. All rights reserved.</p>
    <p style="color: #444; font-size: 0.8rem; margin-top: 0.5rem;"><a href="../fam.html" style="color: #00FFFF;">← Back to The Fam</a></p>
  </footer>
  <script src="../videos.js"></script>
  <script src="../character-loader.js"></script>
</body>
</html>
