<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amit Jr. | Gerch-Verse</title>
  <link rel="stylesheet" href="../gerchverse.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --char-color: #88CCFF; }

    .char-page { 
      padding-top: 100px; 
      max-width: 1400px; 
      margin: 0 auto; 
      padding-left: 1.5rem; 
      padding-right: 1.5rem; 
    }

    .char-header { 
      display: flex; 
      align-items: center; 
      gap: 2rem; 
      margin-bottom: 2.5rem; 
      padding: 2rem; 
      background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 100%); 
      border: 2px solid var(--char-color); 
      border-radius: 20px; 
      box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,0,0,0.2), 0 0 20px var(--char-color); 
    }

    .char-avatar { 
      width: 140px; 
      height: 140px; 
      border-radius: 50%; 
      object-fit: cover; 
      border: 4px solid var(--char-color); 
      box-shadow: 0 0 30px var(--char-color); 
      flex-shrink: 0;
    }

    .char-info h1 { 
      font-family: 'Orbitron', sans-serif; 
      font-size: 2.5rem; 
      color: var(--char-color); 
      margin: 0 0 0.4rem 0; 
      text-shadow: 0 0 20px var(--char-color), 0 0 40px var(--char-color); 
      letter-spacing: 1px;
    }

    .char-handle { 
      color: #aaa; 
      font-size: 1.1rem; 
      margin: 0 0 0.3rem 0; 
      font-family: 'Rajdhani', sans-serif;
    }

    .char-role { 
      color: #888; 
      font-size: 1rem; 
      margin: 0 0 1rem 0; 
      font-family: 'Rajdhani', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .char-stats { 
      display: flex; 
      gap: 1rem; 
      flex-wrap: wrap;
    }

    .char-stats .stat { 
      background: rgba(0, 0, 0, 0.5); 
      padding: 0.6rem 1.2rem; 
      border-radius: 25px; 
      font-size: 0.9rem; 
      color: var(--char-color); 
      border: 2px solid var(--char-color); 
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .video-section { 
      margin-bottom: 3rem; 
      background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.3) 100%);
      border: 2px solid var(--char-color);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 0 30px rgba(0,0,0,0.4), inset 0 0 30px rgba(0,0,0,0.1), 0 0 15px var(--char-color);
    }

    .section-header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      margin-bottom: 1.5rem; 
      padding-bottom: 1rem; 
      border-bottom: 2px solid var(--char-color);
    }

    .section-title { 
      font-family: 'Orbitron', sans-serif; 
      font-size: 1.6rem; 
      color: #fff; 
      margin: 0;
      text-shadow: 0 0 15px var(--char-color);
    }

    .section-title span { 
      color: var(--char-color); 
      font-size: 1.2rem;
      margin-left: 0.75rem;
      text-shadow: 0 0 10px var(--char-color);
    }

    .video-grid { 
      display: grid; 
      grid-template-columns: repeat(6, 1fr); 
      gap: 1rem; 
      width: 100%;
    }

    .video-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .video-card { 
      display: block;
      position: relative;
      width: 100%;
      aspect-ratio: 9/16;
      background: rgba(0, 0, 0, 0.6); 
      border: 1px solid rgba(255,255,255,0.15); 
      border-radius: 12px; 
      overflow: hidden; 
      text-decoration: none; 
      transition: all 0.3s ease;
    }

    .video-card:hover { 
      transform: translateY(-6px) scale(1.03); 
      border-color: var(--char-color); 
      box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 25px var(--char-color); 
      z-index: 10;
    }

    .card-media { 
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .card-media img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block;
    }

    .card-placeholder { 
      width: 100%; 
      height: 100%; 
      background: linear-gradient(135deg, #1a1a2e 0%, #0d1117 100%); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: var(--char-color); 
      font-family: 'Orbitron', sans-serif; 
      font-size: 0.8rem; 
      text-align: center; 
      padding: 0.75rem;
    }

    .card-badge { 
      position: absolute; 
      top: 8px; 
      right: 8px; 
      background: var(--char-color); 
      color: #000; 
      padding: 0.2rem 0.5rem; 
      border-radius: 4px; 
      font-size: 0.7rem; 
      font-weight: 800; 
      text-transform: uppercase;
      z-index: 2;
    }

    .card-caption-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.75rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .costar-row {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
      min-height: 36px;
    }

    .costar-avatar-link {
      display: block;
      transition: transform 0.2s ease;
      text-decoration: none;
    }

    .costar-avatar-link:hover {
      transform: scale(1.2);
    }

    .costar-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .pagination { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      gap: 1.25rem; 
      margin-top: 2rem; 
      padding-top: 1.5rem;
      border-top: 2px solid rgba(255,255,255,0.1);
    }

    .page-btn { 
      background: rgba(0, 0, 0, 0.5); 
      border: 2px solid var(--char-color); 
      color: var(--char-color); 
      padding: 0.75rem 1.5rem; 
      border-radius: 10px; 
      cursor: pointer; 
      font-family: 'Orbitron', sans-serif; 
      font-size: 0.9rem;
      font-weight: 700;
      transition: all 0.2s ease; 
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .page-btn:hover:not(:disabled) { 
      background: var(--char-color); 
      color: #000; 
      box-shadow: 0 0 25px var(--char-color);
      transform: translateY(-3px);
    }

    .page-btn:disabled { 
      opacity: 0.3; 
      cursor: not-allowed; 
      border-color: #444;
      color: #666;
    }

    .page-info { 
      color: #aaa; 
      font-family: 'Rajdhani', sans-serif; 
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .empty-message, .error-message { 
      text-align: center; 
      padding: 3rem; 
      color: #888; 
      font-style: italic; 
      font-family: 'Rajdhani', sans-serif;
      grid-column: 1 / -1;
      font-size: 1.1rem;
    }

    .error-message { 
      color: #ff4444; 
    }

    .loading {
      color: var(--char-color);
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      padding: 2rem;
      font-size: 1.2rem;
      text-shadow: 0 0 15px var(--char-color);
    }

    @media (max-width: 1200px) { 
      .video-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 1rem;
      }
      .char-header {
        padding: 1.5rem;
        gap: 1.5rem;
      }
      .video-section {
        padding: 1.5rem;
      }
    }

    @media (max-width: 768px) { 
      .char-page {
        padding-left: 0.75rem;
        padding-right: 0.75rem;
        padding-top: 85px;
      }

      .char-header { 
        flex-direction: column; 
        text-align: center; 
        padding: 1rem;
        gap: 1rem;
        margin-bottom: 1.5rem;
        border-radius: 16px;
      } 

      .char-avatar { 
        width: 90px; 
        height: 90px; 
        border-width: 2px;
      } 

      .char-info h1 { 
        font-size: 1.6rem; 
      }

      .char-handle {
        font-size: 0.95rem;
      }

      .char-role {
        font-size: 0.85rem;
      }

      .char-stats {
        justify-content: center;
      }

      .char-stats .stat {
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
      }

      .video-section {
        padding: 1rem;
        margin-bottom: 1.5rem;
        border-radius: 16px;
        border-width: 1px;
      }

      .section-header {
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
      }

      .section-title {
        font-size: 1.1rem;
      }

      .section-title span {
        font-size: 0.9rem;
      }

      .video-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 0.75rem; 
      }

      .card-media {
        aspect-ratio: 9/16;
      }

      .video-card {
        border-radius: 8px;
      }

      .card-content {
        padding: 0.5rem;
      }

      .card-oneliner {
        font-size: 0.75rem;
        line-height: 1.2;
        -webkit-line-clamp: 2;
        line-clamp: 2;
      }

      .card-costars {
        font-size: 0.65rem;
        margin-top: 0.2rem;
      }

      .card-badge {
        font-size: 0.6rem;
        padding: 0.15rem 0.35rem;
        top: 4px;
        right: 4px;
      }

      .pagination {
        gap: 0.75rem;
        margin-top: 1rem;
        padding-top: 0.75rem;
        border-top-width: 1px;
      }

      .page-btn {
        padding: 0.5rem 1rem;
        font-size: 0.75rem;
        border-width: 1px;
      }

      .page-info {
        font-size: 0.8rem;
      }
    }

    @media (max-width: 380px) {
      .video-grid {
        gap: 0.5rem;
      }

      .card-oneliner {
        font-size: 0.7rem;
      }
    }

    #multi-videos-section[style*="display: none"] {
      display: none !important;
    }
  </style>
</head>
<body data-character="amitjr">
  <nav class="main-nav">
    <a href="../index.html" class="logo">
      <span class="logo-icon">🥛</span>
      <span class="logo-text">GERCH<span class="highlight">-VERSE</span></span>
    </a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="../fam.html">The Fam</a>
      <a href="../milk-vision.html">Milk Vision</a>
      <a href="../gulag.html">Gulag</a>
      <a href="../careers.html">Careers</a>
    </div>
  </nav>

  <main class="char-page">
    <!-- Hardcoded header matching amit.html structure -->
    <div class="char-header">
      <img src="../images/amitjrq6.jpg" alt="Amit Jr." class="char-avatar">
      <div class="char-info">
        <h1>Amit Jr.</h1>
        <p class="char-handle">@amitjrq6</p>
        <p class="char-role">Son of Amit Gaur, Whistleblower from Q6</p>
        <div class="char-stats">
          <span class="stat" id="solo-stat">0 Solo Videos</span>
          <span class="stat" id="multi-stat">0 Multi Videos</span>
        </div>
      </div>
    </div>

    <section class="video-section">
      <div class="section-header">
        <h2 class="section-title">Solo Videos <span id="solo-count">0</span></h2>
      </div>
      <div id="solo-videos-grid" class="video-grid"></div>
      <div id="solo-pagination" class="pagination" style="display: none;"></div>
    </section>

    <section id="multi-videos-section" class="video-section" style="display: none;">
      <div class="section-header">
        <h2 class="section-title">Multi-Character Videos <span id="multi-count">0</span></h2>
      </div>
      <div id="multi-videos-grid" class="video-grid"></div>
      <div id="multi-pagination" class="pagination" style="display: none;"></div>
    </section>
  </main>

  <footer class="main-footer" style="margin-top: 3rem; padding: 1.5rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.1);">
    <p style="color: #666; font-size: 0.9rem;">&copy; 2025 Gerch-Verse. All udders reserved.</p>
    <p style="color: #444; font-size: 0.75rem; margin-top: 0.5rem;">
      <a href="../fam.html" style="color: var(--char-color); text-decoration: none; font-family: 'Orbitron', sans-serif;">← Back to The Fam</a>
    </p>
  </footer>

  <script src="../videos.js"></script>
  <script>
    // Inline character loader for Amit Jr.
    (function() {
      const CHARACTER_ID = 'amitjr';
      const ITEMS_PER_PAGE = 12;
      
      let soloVideos = [];
      let multiVideos = [];
      let currentSoloPage = 1;
      let currentMultiPage = 1;

      function init() {
        if (typeof VIDEO_DB === 'undefined') {
          document.getElementById('solo-videos-grid').innerHTML = '<div class="error-message">Error: Video database not loaded</div>';
          return;
        }

        // Get solo videos
        soloVideos = VIDEO_DB.solo[CHARACTER_ID] || [];
        
        // Get multi videos where this character appears
        multiVideos = (VIDEO_DB.multi || []).filter(video => 
          video.characters && video.characters.includes(CHARACTER_ID)
        );

        // Update stats in header
        document.getElementById('solo-stat').textContent = soloVideos.length + ' Solo Videos';
        document.getElementById('multi-stat').textContent = multiVideos.length + ' Multi Videos';

        renderSoloVideos();
        renderMultiVideos();
      }

      function renderSoloVideos() {
        const grid = document.getElementById('solo-videos-grid');
        const count = document.getElementById('solo-count');
        const pagination = document.getElementById('solo-pagination');
        
        count.textContent = soloVideos.length;

        if (soloVideos.length === 0) {
          grid.innerHTML = '<div class="empty-message">No solo videos found</div>';
          pagination.style.display = 'none';
          return;
        }

        const totalPages = Math.ceil(soloVideos.length / ITEMS_PER_PAGE);
        const start = (currentSoloPage - 1) * ITEMS_PER_PAGE;
        const pageVideos = soloVideos.slice(start, start + ITEMS_PER_PAGE);

        grid.innerHTML = pageVideos.map(video => createVideoCard(video)).join('');
        
        if (totalPages > 1) {
          pagination.style.display = 'flex';
          pagination.innerHTML = `
            <button class="page-btn" ${currentSoloPage === 1 ? 'disabled' : ''} onclick="changeSoloPage(-1)">← Prev</button>
            <span class="page-info">Page ${currentSoloPage} of ${totalPages}</span>
            <button class="page-btn" ${currentSoloPage === totalPages ? 'disabled' : ''} onclick="changeSoloPage(1)">Next →</button>
          `;
        } else {
          pagination.style.display = 'none';
        }
      }

      function renderMultiVideos() {
        const section = document.getElementById('multi-videos-section');
        const grid = document.getElementById('multi-videos-grid');
        const count = document.getElementById('multi-count');
        const pagination = document.getElementById('multi-pagination');

        count.textContent = multiVideos.length;

        if (multiVideos.length === 0) {
          section.style.display = 'none';
          return;
        }

        section.style.display = 'block';
        
        const totalPages = Math.ceil(multiVideos.length / ITEMS_PER_PAGE);
        const start = (currentMultiPage - 1) * ITEMS_PER_PAGE;
        const pageVideos = multiVideos.slice(start, start + ITEMS_PER_PAGE);

        grid.innerHTML = pageVideos.map(video => createVideoCard(video, true)).join('');
        
        if (totalPages > 1) {
          pagination.style.display = 'flex';
          pagination.innerHTML = `
            <button class="page-btn" ${currentMultiPage === 1 ? 'disabled' : ''} onclick="changeMultiPage(-1)">← Prev</button>
            <span class="page-info">Page ${currentMultiPage} of ${totalPages}</span>
            <button class="page-btn" ${currentMultiPage === totalPages ? 'disabled' : ''} onclick="changeMultiPage(1)">Next →</button>
          `;
        } else {
          pagination.style.display = 'none';
        }
      }

      function createVideoCard(video, isMulti = false) {
        const costars = isMulti && video.characters ? video.characters.filter(c => c !== CHARACTER_ID) : [];
        
        let costarHtml = '';
        if (costars.length > 0 && typeof CHARACTERS !== 'undefined') {
          costarHtml = '<div class="costar-row">' + costars.map(charId => {
            const char = CHARACTERS[charId];
            if (!char) return '';
            return `<a href="./${charId}.html" class="costar-avatar-link" title="${char.name}">
              <img src="${char.avatar}" alt="${char.name}" class="costar-avatar" style="border-color: ${char.color || '#fff'}">
            </a>`;
          }).join('') + '</div>';
        }

        return `
          <div class="video-cell">
            <a href="https://sora.chatgpt.com/v/${video.id}" target="_blank" rel="noopener" class="video-card">
              <div class="card-media">
                ${video.thumb ? 
                  `<img src="../thumbs/${video.thumb}" alt="${video.oneLiner || 'Video thumbnail'}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-placeholder\\'>SORA</div>'">` : 
                  '<div class="card-placeholder">SORA</div>'
                }
              </div>
              <div class="card-caption-overlay">${video.oneLiner || 'Untitled'}</div>
              <span class="card-badge">SORA</span>
            </a>
            ${costarHtml}
          </div>
        `;
      }

      window.changeSoloPage = function(delta) {
        currentSoloPage += delta;
        renderSoloVideos();
      };

      window.changeMultiPage = function(delta) {
        currentMultiPage += delta;
        renderMultiVideos();
      };

      // Initialize when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
